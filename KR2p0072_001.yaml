body:
  text: 廢其賨南蠻獻不共承王事我先君闔閭孤居褓襁之中亦唯君是望君而或言若是此則社稷君之順之則君之志也兩君之弗順敢不芒往道以告吳請成於楚昔上天不中降禍於我二邑非疾困安加之而殄絶我二邑之好先人有言曰馬將走或衝之速殃州來告曰曹來孤使一介使親於桃逆地名勞其大夫且請其行荊為不道謂余曰汝周之孽子噬敢居我江濱曰余必亡爾社稷以廣東海之表天其中卑周先王佾有軒冕之賞或有斧鉞之威以此前後之者猶不能以牧民而反志望下之相擠也豈不差哉塞在波濤之間舅甥之邦攝周子孫唯余一人所禮寧心緩憂亦唯吾伯父晉故用使其三臣毋敢有遲速之期敢告視日答曰三大夫辱命於寡君之僕寡君一人俚先王之福天子之靈孤也何勞力之有焉孤也敢致先王之福天子之靈吳人虐于周寡人問左右孰為師徒踐履陳地以陳邦非它也先王姑姊大姬之邑
